name: Flight Segment CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  # Skip intermediate builds: always.
  # Cancel intermediate builds: only if it is a pull request build.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

jobs:
  build-dev:
    name: Development build with clang-tidy
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install clang-tidy libcurl4-openssl-dev libomp-dev

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.12"
          enable-cache: true
          activate-environment: true

      - name: Install Python dependencies
        run: uv pip install -r flight_segment/orion/lib/fprime/requirements.txt

      - name: Build llama.cpp
        run: |
          cd ground_segment/llama.cpp
          cmake -B build \
            -DBUILD_SHARED_LIBS=OFF \
            -DLLAMA_BUILD_TESTS=OFF \
            -DLLAMA_BUILD_EXAMPLES=OFF \
            -DLLAMA_BUILD_SERVER=OFF
          cmake --build build -j$(nproc)

      - name: Generate and build with clang-tidy
        run: |
          cd flight_segment/orion
          fprime-util generate -DCMAKE_CXX_CLANG_TIDY=clang-tidy
          fprime-util build --all -j$(nproc)

      - name: Verify binary exists
        run: test -f flight_segment/orion/build-artifacts/Linux/Orion/bin/Orion

  build-deploy:
    name: Deployment build for ARM64 Pi
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Build base image
        run: docker build -t orion-base -f docker/Dockerfile.base .

      - name: Build flight segment
        run: docker build -f docker/Dockerfile.pi .
