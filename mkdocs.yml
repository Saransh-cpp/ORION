site_name: ORION
site_description: Orbital Real-time Inference and Observation Network
repo_url: https://github.com/Saransh-cpp/ORION

theme:
  name: material
  logo: assets/orion_logo.png
  favicon: assets/orion_logo.png
  palette:
    - scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - content.code.copy
    - content.tabs.link

validation:
  links:
    not_found: info

plugins:
  - search
  - mkdoxy:
      projects:
        flight-segment:
          src-dirs: flight_segment/orion/Orion
          full-doc: true
          template-dir: docs/templates
          doxy-cfg:
            FILE_PATTERNS: "*.hpp *.cpp"
            RECURSIVE: YES
            EXCLUDE_PATTERNS: "*/build-*/* */Top/*"
            EXTRACT_ALL: YES
            EXTRACT_PRIVATE: YES
            EXTRACT_STATIC: YES
            GENERATE_HTML: NO
            GENERATE_XML: YES
  - mkdocstrings:
      handlers:
        python:
          paths: [ground_segment]
          options:
            show_source: true
            show_root_heading: true

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.snippets:
      base_path: ["."]
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Architecture:
      - Overview: architecture/overview.md
      - Flight Segment:
          - Overview: architecture/flight_segment/components/index.md
          - State Machine: architecture/flight_segment/state-machine.md
          - Data Flow: architecture/flight_segment/data-flow.md
          - Mission Budgets: architecture/flight_segment/budgets.md
          - EventAction: architecture/flight_segment/components/event-action.md
          - NavTelemetry: architecture/flight_segment/components/nav-telemetry.md
          - CameraManager: architecture/flight_segment/components/camera-manager.md
          - VlmInferenceEngine: architecture/flight_segment/components/vlm-inference-engine.md
          - TriageRouter: architecture/flight_segment/components/triage-router.md
          - GroundCommsDriver: architecture/flight_segment/components/ground-comms-driver.md
      - Ground Segment:
          - Overview: architecture/ground_segment/index.md
          - Receiver: architecture/ground_segment/receiver.md
          - Training Pipeline: architecture/ground_segment/training.md
          - Dataset: architecture/ground_segment/data.md
          - Model Card: architecture/ground_segment/model-card.md
          - Utility Scripts: architecture/ground_segment/scripts.md
          - Compute Budgets: architecture/ground_segment/budgets.md
  - Guides:
      - Flight Segment:
          - Development: guides/installation.md
          - Deployment: guides/deployment.md
          - Environment Variables: guides/environment-variables.md
      - Ground Segment:
          - Data Generation: guides/data-gen.md
          - Training: guides/training.md
          - Quantization: guides/quantization.md
          - Receiver: guides/receiver.md
          - Studies: guides/studies.md
          - Environment Variables: guides/environment-variables-gs.md
  - API Reference:
      - Overview: api/overview.md
      - C++ (Flight Segment):
          - Classes:
              - Class List: flight-segment/annotated.md
              - Class Index: flight-segment/classes.md
              - Class Members: flight-segment/class_members.md
          - Namespaces:
              - Namespace List: flight-segment/namespaces.md
              - Namespace Members: flight-segment/namespace_members.md
          - Files:
              - File List: flight-segment/files.md
      - Python (Ground Segment):
          - Receiver: api/python/receiver.md
          - Visualization: api/python/raw_to_jpg.md
          - Training:
              - fine_tune: api/python/training/fine_tune.md
              - evaluate: api/python/training/evaluate.md
              - fuse: api/python/training/fuse.md
          - Experiments:
              - ablation: api/python/experiments/ablation.md
          - Data:
              - data: api/python/data/data.md
              - data_gen: api/python/data/data_gen.md
  - Contributing: contributing.md
